<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(#{page.title.changePassword}, ~{::body})}">
<body>
  <h1 class="page-title" th:text="#{auth.change.h1}">Alterar senha</h1>
  <p class="page-subtitle" th:text="#{auth.change.subtitle}">Atualize sua senha seguindo a política</p>

  <div th:if="${param.error}" class="alert bad">
    <span th:text="#{auth.change.error}">Não foi possível alterar a senha. Verifique a senha atual e tente novamente.</span>
  </div>

  <div th:if="${param.ok}" class="alert ok">
    <span th:text="#{auth.change.success}">Senha alterada com sucesso.</span>
  </div>

  <form class="form" method="post" th:action="@{/password/change}" id="passwordForm">
    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label class="field-label" for="currentPassword" th:text="#{auth.change.currentPassword}">Senha atual</label>
      <div class="ig">
        <div class="ig-left" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2H10Z" fill="currentColor"/>
          </svg>
        </div>
        <input class="ig-input" id="currentPassword" name="currentPassword" type="password"
               th:placeholder="#{password.placeholder}" placeholder="••••••••"
               autocomplete="current-password" required/>
        <div class="ig-right">
          <button class="icon-btn" type="button" tabindex="-1"
                  data-toggle="password" data-target="currentPassword"
                  th:attr="aria-label=#{password.toggle.ariaLabel}"
                  aria-label="Mostrar senha" aria-pressed="false">
            <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div>
      <label class="field-label" for="newPassword" th:text="#{auth.change.newPassword}">Nova senha</label>
      <div class="ig">
        <div class="ig-left" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2H10Z" fill="currentColor"/>
          </svg>
        </div>
        <input class="ig-input" id="newPassword" name="newPassword" type="password"
               th:placeholder="#{password.placeholder}" placeholder="••••••••"
               autocomplete="new-password" required/>
        <div class="ig-right">
          <button class="icon-btn" type="button" tabindex="-1"
                  data-toggle="password" data-target="newPassword"
                  th:attr="aria-label=#{password.toggle.ariaLabel}"
                  aria-label="Mostrar senha" aria-pressed="false">
            <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div>
      <label class="field-label" for="confirmPassword" th:text="#{auth.change.confirmPassword}">Confirmar nova senha</label>
      <div class="ig">
        <div class="ig-left" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <input class="ig-input" id="confirmPassword" name="confirmPassword" type="password"
               th:placeholder="#{password.placeholder}" placeholder="••••••••"
               autocomplete="new-password" required/>
        <div class="ig-right">
          <button class="icon-btn" type="button" tabindex="-1"
                  data-toggle="password" data-target="confirmPassword"
                  th:attr="aria-label=#{password.toggle.ariaLabel}"
                  aria-label="Mostrar senha" aria-pressed="false">
            <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="small mt-6" id="matchHint"></div>
    </div>

    <div class="rules" id="policyBox" data-policy-endpoint="/api/password/policy" data-check-endpoint="/api/password/policy/check">
      <div class="rules-title" th:text="#{cardsync.passwordPolicy.title}">Política de senha</div>
      <div class="small" id="policyHint"><span th:text="#{auth.policy.loading}">Carregando política…</span></div>
      <div id="policyRules" class="rules-grid" aria-live="polite"></div>
    </div>

    <button class="btn primary" type="submit" id="submitBtn" disabled th:text="#{auth.change.submit}">Alterar senha</button>

    <div class="center">
      <a class="link" th:href="@{/login}" th:text="#{common.backToLogin}">Voltar para o login</a>
    </div>
  </form>
<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/password-toggle.js}"></script>
<script th:src="@{/js/password-policy.js}"></script>
</body>
</html>

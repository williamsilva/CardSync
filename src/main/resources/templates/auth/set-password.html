<!doctype html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(#{page.title.setPassword}, ~{::body})}">
<body>
  <h1 class="page-title" th:text="#{auth.set.h1}">x</h1>
  <p class="page-subtitle" th:text="#{auth.set.subtitle}">x</p>

  <div th:if="${!valid}" class="alert bad">
    <b th:text="#{auth.set.invalid}">Link inválido ou expirado.</b>
    <div class="small mt-6" th:text="#{auth.set.hint}">Peça ao suporte para reenviar o convite.</div>
  </div>

  <div th:if="${valid}">
    <div class="alert ok">
      <b th:text="#{auth.set.welcomeTitle}">Bem-vindo!</b>
      <span th:text="#{auth.set.welcomeBody}">Defina uma senha para concluir o primeiro acesso.</span>
    </div>

    <form class="form" method="post"
          th:action="@{|/password/set/${userId}/${token}|}"
          id="passwordForm">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- username hidden (não aparece na tela) -->
      <input type="hidden" id="username" name="username" th:value="${username}"/>

      <div>
        <label class="field-label" for="newPassword" th:text="#{auth.set.newPassword}">Nova senha</label>
        <div class="ig">
          <div class="ig-left" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2H10Z"
                    fill="currentColor"/>
            </svg>
          </div>
          <input class="ig-input" id="newPassword" name="newPassword" type="password"
                 th:placeholder="#{password.placeholder}" placeholder="••••••••"
                 required autocomplete="new-password"/>
          <div class="ig-right">
            <button class="icon-btn" type="button" tabindex="-1"
                    data-toggle="password" data-target="newPassword"
                    th:attr="aria-label=#{password.toggle.ariaLabel}"
                    aria-label="Mostrar senha" aria-pressed="false">
              <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div>
        <label class="field-label" for="confirmPassword" th:text="#{auth.set.confirmPassword}">Confirmar nova senha</label>
        <div class="ig">
          <div class="ig-left" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <input class="ig-input" id="confirmPassword" name="confirmPassword" type="password"
                 th:placeholder="#{password.placeholder}" placeholder="••••••••"
                 required autocomplete="new-password"/>
          <div class="ig-right">
            <button class="icon-btn" type="button" tabindex="-1"
                    data-toggle="password" data-target="confirmPassword"
                    th:attr="aria-label=#{password.toggle.ariaLabel}"
                    aria-label="Mostrar senha" aria-pressed="false">
              <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="small mt-6" id="matchHint"></div>
      </div>

      <div class="rules" id="policyBox" data-policy-endpoint="/api/password/policy" data-check-endpoint="/api/password/policy/check">
        <div class="rules-title" th:text="#{cardsync.passwordPolicy.title}">Política de senha</div>
        <div class="small" id="policyHint"><span th:text="#{auth.policy.loading}">Carregando política…</span></div>
        <div id="policyRules" class="rules-grid" aria-live="polite"></div>
      </div>

      <button class="btn primary" type="submit" id="submitBtn" disabled><span th:text="#{auth.set.submit}">Salvar senha</span></button>

      <div class="center">
        <a class="link" th:href="@{/login}" th:text="#{common.backToLogin}">Voltar para o login</a>
      </div>
    </form>
  </div>

<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/password-toggle.js}"></script>
<script th:src="@{/js/password-policy.js}"></script>
</body>
</html>

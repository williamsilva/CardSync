<!doctype html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(#{page.title.forgetPassword}, ~{::body})}">
<body>
  <h1 class="page-title" th:text="#{forget.h1}">Esqueci a senha</h1>
  <p class="page-subtitle" th:text="#{forget.subtitle}">Informe seu usuário. Se existir, enviaremos um e-mail com instruções.</p>

  <div th:if="${param.sent}" class="alert ok" th:text="#{forget.sent}">
    Se o usuário existir, um e-mail foi enviado com instruções.
  </div>

  <form class="form" method="post" th:action="@{/forget-password}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label class="field-label" for="username" th:text="#{forget.username.label}">Usuário</label>
      <div class="ig">
        <div class="ig-left" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M20 20a8 8 0 1 0-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <input class="ig-input" id="username" name="username" autocomplete="username" required
               th:placeholder="#{forget.username.placeholder}"/>
      </div>
    </div>

    <button class="btn primary" type="submit" th:text="#{forget.submit}">Enviar</button>

    <div class="center">
      <a class="link" th:href="@{/login}" th:text="#{common.backToLogin}">Voltar para o login</a>
    </div>
  </form>
</body>
</html>

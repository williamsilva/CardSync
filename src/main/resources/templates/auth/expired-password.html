<!doctype html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(#{cardsync.expiredPassword.title}, ~{::body})}">
<body>

<h1 class="page-title">
  <span th:text="#{cardsync.expiredPassword.h1}">Senha expirada</span>
  <span class="wave" aria-hidden="true">👋</span>
</h1>
<p class="page-subtitle" th:text="#{cardsync.expiredPassword.subtitle}">
  Para continuar, crie uma nova senha para sua conta.
</p>

<div class="alert bad center"
     th:classappend="${param.error} != null ? ' show' : ''"
     role="alert">
  <b th:text="#{cardsync.generic.errorTitle}">Ops!</b>
  <span th:text="#{cardsync.expiredPassword.neutralError}">
    Não foi possível trocar a senha. Tente novamente.
  </span>
</div>

<form id="passwordForm"
      class="form"
      th:action="@{/password/expired}"
      method="post"
      autocomplete="off"
      novalidate>

  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

  <!-- username hidden (não aparece na tela) -->
  <input type="hidden" id="username" name="username" th:value="${username}"/>

  <!-- Nova senha -->
  <div class="field">
    <label class="field-label" for="newPassword" th:text="#{cardsync.expiredPassword.newPasswordLabel}">
      Nova senha
    </label>

    <div class="ig">
      <div class="ig-left" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2H10Z"
                fill="currentColor"/>
        </svg>
      </div>

      <input class="ig-input"
             id="newPassword"
             name="newPassword"
             type="password"
             th:placeholder="#{password.placeholder}"
             placeholder="••••••••"
             autocomplete="new-password"
             required/>

      <div class="ig-right">
        <button type="button"
                class="icon-btn"
                tabindex="-1"
                data-toggle="password"
                data-target="newPassword"
                th:attr="aria-label=#{password.toggle.ariaLabel}"
                aria-label="Mostrar senha"
                aria-pressed="false">

          <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>

          <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
          </svg>

        </button>
      </div>
    </div>
  </div>

  <!-- Confirmar -->
  <div class="field">
    <label class="field-label" for="confirmPassword" th:text="#{cardsync.expiredPassword.confirmPasswordLabel}">
      Confirmar nova senha
    </label>

    <div class="ig">
      <div class="ig-left" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <input class="ig-input"
             id="confirmPassword"
             name="confirmPassword"
             type="password"
             th:placeholder="#{password.placeholder}"
             placeholder="••••••••"
             autocomplete="new-password"
             required/>

      <div class="ig-right">
        <button type="button"
                class="icon-btn"
                tabindex="-1"
                data-toggle="password"
                data-target="confirmPassword"
                th:attr="aria-label=#{password.toggle.ariaLabel}"
                aria-label="Mostrar senha"
                aria-pressed="false">

          <svg class="eye-closed-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>

          <svg class="eye-open-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 15a3 3 0 1 0-3-3 3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8"/>
          </svg>

        </button>
      </div>
    </div>

    <div id="matchHint" class="small mt-6" aria-live="polite"></div>
  </div>

  <!-- Policy checklist -->
  <div id="policyBox"
       class="rules"
       data-policy-endpoint="/api/password/policy"
       data-check-endpoint="/api/password/policy/check">
    <div class="rules-title" th:text="#{cardsync.passwordPolicy.title}">
      Política de senha
    </div>

    <div id="policyHint" class="small"></div>
    <div id="policyRules" class="rules-grid" aria-live="polite"></div>
  </div>

  <button id="submitBtn" type="submit" class="btn primary" disabled
          th:text="#{cardsync.expiredPassword.submit}">
    Atualizar senha
  </button>

  <div class="center mt-10">
    <a class="link" th:href="@{/login}" th:text="#{cardsync.expiredPassword.backToLogin}">
      Voltar para o login
    </a>
  </div>
</form>

<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/password-toggle.js}"></script>
<script th:src="@{/js/username-prefill.js}"></script>
<script th:src="@{/js/password-policy.js}"></script>

</body>
</html>

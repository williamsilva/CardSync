<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale}"
      th:replace="~{mail/_layout :: layout(
        #{mail.firstPassword.title},
        ${setPasswordUrl},
        #{mail.firstPassword.actionText},
        ${validity},
        #{mail.firstPassword.footerNote}
      )}">
<th:block th:fragment="content">
  <p style="margin:0 0 12px 0;font-size:15px;line-height:1.85;color:#cbd5e1;"
     th:text="#{mail.firstPassword.bodyLine1}">
    Seu acesso ao CardSync foi criado com sucesso.
  </p>
  <p style="margin:0 0 12px 0;font-size:15px;line-height:1.85;color:#cbd5e1;"
     th:text="#{mail.firstPassword.bodyLine2}">
    Para concluir seu cadastro e ativar sua conta, clique no botão abaixo para definir sua primeira senha.
  </p>
</th:block>
</html>

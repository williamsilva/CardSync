<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <th:block th:fragment="passwordPolicy">
    <section class="policy-card" aria-labelledby="pwd-policy-title">
      <div class="policy-card__header">
        <h2 id="pwd-policy-title" class="policy-card__title" th:text="#{cardsync.passwordPolicy.title}">Política de senha</h2>
      </div>

      <!--
        Regra visual: os itens têm data-rule para o JS marcar OK/FAIL.
        Mantém o mesmo padrão de marcação usado nas telas de senha (expirada/reset/set/change).
      -->
      <div class="policy-list" data-password-policy>
        <div class="rule-item" data-rule="minLength">
          <span class="rule-icon" aria-hidden="true">○</span>
          <span class="rule-text" th:text="#{password.rule.minLength}">Mínimo 8 caracteres</span>
        </div>

        <div class="rule-item" data-rule="digit">
          <span class="rule-icon" aria-hidden="true">○</span>
          <span class="rule-text" th:text="#{password.rule.digit}">Ao menos 1 número</span>
        </div>

        <div class="rule-item" data-rule="upper">
          <span class="rule-icon" aria-hidden="true">○</span>
          <span class="rule-text" th:text="#{password.rule.upper}">Ao menos 1 letra maiúscula</span>
        </div>

        <div class="rule-item" data-rule="symbol">
          <span class="rule-icon" aria-hidden="true">○</span>
          <span class="rule-text" th:text="#{password.rule.symbol}">Ao menos 1 símbolo</span>
        </div>
      </div>

      <p class="policy-hint" th:text="#{password.rule.hint}">A senha deve atender todas as regras acima.</p>
    </section>
  </th:block>
</html>
